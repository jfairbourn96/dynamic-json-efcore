name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Dynamic.Json.EfCore.slnx

      - name: Build
        run: dotnet build Dynamic.Json.EfCore.slnx --configuration Release --no-restore

      - name: Unit tests
        run: dotnet test Dynamic.Json.EfCore.UnitTests\Dynamic.Json.EfCore.UnitTests.csproj --configuration Release --no-build

      - name: Vulnerability audit
        run: dotnet list Dynamic.Json.EfCore.slnx package --vulnerable --include-transitive

      - name: Pack
        run: dotnet pack Dynamic.Json.EfCore.slnx --configuration Release --no-build --output artifacts/packages
