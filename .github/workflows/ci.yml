name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Dynamic.Json.EfCore.slnx

      - name: Build
        run: dotnet build Dynamic.Json.EfCore.slnx --configuration Release --no-restore

      - name: Unit tests with coverage
        run: dotnet test Dynamic.Json.EfCore.UnitTests\Dynamic.Json.EfCore.UnitTests.csproj --configuration Release --no-build --settings coverlet.runsettings --results-directory artifacts/coverage/raw --collect "XPlat Code Coverage"

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.10
        with:
          reports: 'artifacts/coverage/raw/**/coverage.cobertura.xml'
          targetdir: 'artifacts/coverage/report'
          reporttypes: 'HtmlInline;Cobertura;MarkdownSummaryGithub'
          assemblyfilters: '+Dynamic.Json.*;-*.UnitTests;-*.IntegrationTests;-*.Tests'

      - name: Publish coverage summary
        shell: pwsh
        run: Get-Content artifacts/coverage/report/SummaryGithub.md | Add-Content $env:GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: artifacts/coverage/report

      - name: Vulnerability audit
        run: dotnet list Dynamic.Json.EfCore.slnx package --vulnerable --include-transitive

      - name: Pack
        run: dotnet pack Dynamic.Json.EfCore.slnx --configuration Release --no-build --output artifacts/packages
