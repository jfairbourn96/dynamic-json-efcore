name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Pack and publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Dynamic.Json.EfCore.slnx

      - name: Build
        run: dotnet build Dynamic.Json.EfCore.slnx --configuration Release --no-restore

      - name: Unit tests
        run: dotnet test Dynamic.Json.EfCore.UnitTests\Dynamic.Json.EfCore.UnitTests.csproj --configuration Release --no-build

      - name: Pack
        run: dotnet pack Dynamic.Json.EfCore.slnx --configuration Release --no-build --output artifacts/packages

      - name: NuGet login
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish
        shell: pwsh
        run: |
          $packages = @(Get-ChildItem artifacts/packages -Filter *.nupkg)
          if ($packages.Count -eq 0) {
            throw "No NuGet packages found in artifacts/packages."
          }

          $packages | ForEach-Object {
            dotnet nuget push $_.FullName --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
